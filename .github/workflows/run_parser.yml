name: "Update Subscriptions"
run: python advanced_parser.py --threads 40 --strategy diverse --force-xray --full-check 300 --full-check-retries 2
on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:         # ручной запуск

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # базовой проверки хватает с запасом
    permissions:
      contents: write        # разрешаем коммиты
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser
        run: python advanced_parser.py --threads 40 --strategy diverse

      - name: Update README with subscription links
        run: python update_readme.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автообновление подписок и README"
          file_pattern: '*.txt README.md'
