name: "Update Subscriptions"

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:         # ручной запуск

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # ограничение времени выполнения
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download RKP IP list
        run: curl -sL https://raw.githubusercontent.com/RKPchannel/RKP_bypass_configs/main/iP.txt -o russia_ip.txt

      - name: Download RKP domain list
        run: curl -sL https://raw.githubusercontent.com/RKPchannel/RKP_bypass_configs/main/domain.txt -o russia_domains.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser
        run: python advanced_parser.py --max-check 5000 --threads 40 --strategy diverse

      - name: Update README with subscription links
        run: python update_readme.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автообновление подписок и README"
          file_pattern: '*.txt README.md'
