name: "Update Subscriptions (BS)"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser (Telegram, all checks, high parallelism)
        run: python advanced_parser.py --threads 30 --xray-threads 40 --parse-telegram

      - name: Update README with subscription links
        run: python update_readme.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автообновление (оптимизированное) и README"
          file_pattern: '*.txt README.md'
