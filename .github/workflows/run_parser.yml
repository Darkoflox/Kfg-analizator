name: "Update Subscriptions"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45          # чуть больше времени на Xray-проверку
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser
        run: python advanced_parser.py --threads 40 --strategy diverse --full-check 500 --full-check-retries 1

      - name: Update README with subscription links
        run: python update_readme.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автообновление подписок и README"
          file_pattern: '*.txt README.md'
