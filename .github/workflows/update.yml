name: Whitelist Parser

on:
  workflow_dispatch: # Позволяет запускать вручную
  schedule:
    - cron: '0 */ * * *' # ИЗМЕНЕНО: Запуск каждые 6 часов

jobs:
  build-whitelist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run whitelist parser
        run: python whitelist_parser.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add whitelist/ # Добавляем всю папку с результатами
          # Проверяем, есть ли изменения для коммита
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update whitelist subscriptions [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push
          else
            echo "No changes to commit."
          fi
